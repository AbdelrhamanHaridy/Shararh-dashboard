<div [class]="'px-8 py-5 ' + bgColor() + ' rounded-2xl shadow-md flex flex-row justify-between items-center gap-4'">
    <div class="flex flex-col">
        <h2 [class]="'text-base font-medium ' + messageColor()">{{ message() }}</h2>
        @if (description()) {
        <p class="text-text-secondary text-sm">{{ description() }}</p>
        }
    </div>
    @if (linkText() && linkUrl()) {
    <a [href]="linkUrl()" class="text-text-success font-lexend font-bold underline whitespace-nowrap  flex-1 text-center">{{ linkText()
        }}</a>
    }
    @if (time()) {
    <div class="flex flex-row gap-2 w-fit">
        <img src="assets/icons/global/clock.svg" alt="Time">
        <p class="text-text-secondary text-sm font-lexend font-bold text-nowrap">{{ time() }}</p>
    </div>
    }
</div>
