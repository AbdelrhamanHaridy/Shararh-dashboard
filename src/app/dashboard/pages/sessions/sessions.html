<main class="p-4 sm:p-6 flex flex-col gap-5 sm:gap-6">
    <section>
        <app-page-header title="الجلسات" [home]="home" [breadcrumbItems]="breadcrumbItems"></app-page-header>
    </section>
    <section class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-2.5">
        <app-shared-kpi-card [title]="'العملاء المسجلين'" [number]="120" iconPath="assets/icons/cards/people.svg"
            iconBgColor="#C3E1FF" numberColor="#137FEC">
        </app-shared-kpi-card>
        <app-shared-kpi-card [title]="'الاشتراكات المنتهيه'" [number]="5" iconPath="assets/icons/cards/people.svg"
            iconBgColor="#C3E1FF" numberColor="#D22F27">
        </app-shared-kpi-card>
        <app-shared-kpi-card [title]="'الاشتراكات الفعًّاله'" [number]="15" iconPath="assets/icons/cards/people.svg"
            iconBgColor="#C3E1FF" numberColor="#10A922">
        </app-shared-kpi-card>
        <app-shared-kpi-card [title]="'إجمالي الاشتراكات'" [number]="20" iconPath="assets/icons/cards/people.svg"
            iconBgColor="#C3E1FF" numberColor="#000">
        </app-shared-kpi-card>
    </section>
    <h2 class="text-text-primary text-sm sm:text-base font-tajawal font-medium">استعرض وراقب أداء الجلسات المالية
        لموظفيك بدقة</h2>
    <section class="bg-white rounded-3xl p-4 sm:p-7 border border-[#3D4B361A] flex flex-col gap-4 relative">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-6 items-end">
            <app-shared-select label="التاريخ" placeholder="حدد التاريخ" inputId="contactVia"
                [options]="contactViaOptions" optionLabel="label" optionValue="value" primeNgIcon="pi pi-phone"
                [isRequired]="true"></app-shared-select>
            <app-shared-select label="الموظف" placeholder="اسم الموظف" inputId="contactVia"
                [options]="contactViaOptions" optionLabel="label" optionValue="value" primeNgIcon="pi pi-phone"
                [isRequired]="true"></app-shared-select>
            <app-shared-select label="نوع الجلسه" placeholder="اختر نوع الجلسه" inputId="contactVia"
                [options]="contactViaOptions" optionLabel="label" optionValue="value" primeNgIcon="pi pi-phone"
                [isRequired]="true"></app-shared-select>
        </div>
    </section>
    <section>
        <app-shared-table [tableData]="sessions" [columns]="columns" [totalRecords]="totalSessions"
            (rowClick)="onSessionRowClick()"></app-shared-table>
    </section>
</main>
