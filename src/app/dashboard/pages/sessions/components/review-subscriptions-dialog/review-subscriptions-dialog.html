<section class="flex flex-col gap-4 font-tajawal">
    <div class="flex items-center justify-between gap-3">
        <div class="flex flex-col gap-1">
            <p class="text-text-secondary text-sm font-medium">ملخص طلبات الدفع المرتبطة بالاشتراكات</p>
        </div>
    </div>

    <div class="overflow-hidden rounded-2xl border border-[#E2E8F0] bg-white">
        <table class="w-full border-collapse text-right text-sm">
            <thead class="bg-[#F8FAFC] text-[#64748B]">
                <tr>
                    <th scope="col" class="px-4 py-3 font-medium">ملاحظه الدفع</th>
                    <th scope="col" class="px-4 py-3 font-medium">حالة الدفع</th>
                    <th scope="col" class="px-4 py-3 font-medium">طريقة الدفع</th>
                    <th scope="col" class="px-4 py-3 font-medium">العميل</th>
                </tr>
            </thead>

            <tbody>
                @for (row of subscriptionRows; track row.customer) {
                <tr class="border-t border-[#E2E8F0] text-[#191C18]">
                    <td class="px-4 py-3 align-top">{{ row.note }}</td>
                    <td class="px-4 py-3 align-top">
                        <span
                            class="inline-flex rounded-full bg-[#EEF2FF] px-3 py-1 text-xs font-medium text-[#334155]">
                            {{ row.paymentStatus }}
                        </span>
                    </td>
                    <td class="px-4 py-3 align-top">{{ row.paymentMethod }}</td>
                    <td class="px-4 py-3 align-top font-medium">{{ row.customer }}</td>
                </tr>
                }
            </tbody>
        </table>
    </div>
    <button type="button"
        class="inline-flex items-center justify-center gap-2.5 w-full h-fit py-3 pr-2.5 pl-2.5 rounded-[15px] bg-[#10A922] text-white text-sm font-bold hover:opacity-90 transition-opacity cursor-pointer mt-5">
        تأكيد المراجعه
    </button>
</section>
