<div class="">
    <p class="text-base text-primary font-medium text-center mx-auto mb-7">انستا باي</p>
    <div class="p-fluid">
        <form [formGroup]="paymentMethodForm" (ngSubmit)="saveAndClose()" class="flex flex-col gap-6" dir="rtl">
            <div class="flex flex-col gap-5 bg-white rounded-lg">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="p-5 bg-[#F6F9FD] rounded-[20px] col-span-2">
                        <p class="text-sm text-text-secondary font-medium mb-7">تفاصيل الحساب البنكي</p>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="md:col-span-1">
                                <app-shared-text-input formControlName="bankName" label="اسم البنك"
                                    placeholder="ادخل اسم البنك" inputId="bankName" [isRequired]="true"
                                    type="text"></app-shared-text-input>
                            </div>
                            <div class="md:col-span-1">
                                <app-shared-text-input formControlName="beneficiaryName" label="اسم المستفيد"
                                    placeholder="ادخل اسم المستفيد" inputId="beneficiaryName" [isRequired]="true"
                                    type="text"></app-shared-text-input>
                            </div>
                            <div class="md:col-span-2">
                                <app-shared-text-input formControlName="accountNumber" label="رقم الحساب"
                                    placeholder="ادخل رقم الحساب" inputId="accountNumber" [isRequired]="true"
                                    type="text"></app-shared-text-input>
                            </div>
                        </div>
                    </div>
                    <div class="md:col-span-2 field">
                        <label for="description" class="text-text-label text-base font-medium">الوصف</label>
                        <textarea id="description" formControlName="description" rows="4" placeholder="ادخل الوصف"
                            class="w-full px-4 py-2 border border-[#E2E8F0] rounded-[15px] mt-2 resize-none"></textarea>
                    </div>
                </div>

                <div
                    class="flex flex-row justify-between items-center px-6 py-2.5 bg-[#F9FAFB] border border-[#E5E7EB] rounded-2xl">
                    <p class="text-[#151E11] text-base font-medium font-tajawal">تطبيق الرسوم</p>
                    <div class="flex flex-row justify-between items-center" dir="ltr">
                        <p-toggleswitch formControlName="applyFees" />
                    </div>
                </div>

                <div class="dialog-actions flex flex-row gap-4 justify-end">
                    <button type="submit"
                        class="px-12 py-3 bg-primary text-white rounded-2xl cursor-pointer w-fit hover:bg-primary-dark transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                        حفظ التغييرات
                    </button>
                </div>
            </div>

        </form>
    </div>
</div>
