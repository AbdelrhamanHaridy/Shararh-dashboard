<main class="p-6 flex flex-col gap-6">
    <section class="">
        <app-page-header title="التسعير والباقات" [home]="home" [breadcrumbItems]="breadcrumbItems"></app-page-header>
    </section>

    <div class="flex flex-row justify-between items-center">
        <p class="text-base text-[#43493E] font-medium py-3">تحكم في خطط الاشتراك، الأسعار، والقيود لكل باقة
        </p>
        <button type="button"
            class="px-12 py-3 text-white bg-primary text-base font-bold rounded-2xl cursor-pointer inline-flex items-center gap-2 ">
            <img src="assets/icons/global/plus.svg" alt="Plus">
            إضافة باقة جديدة
        </button>
    </div>
    
    <section class="bg-white px-2.5 py-6 rounded-xl">
        <div class="flex flex-row justify-between items-center mb-8">
            <h2 class="text-[#191C18] text-2xl font-tajawal font-medium">
                الباقات الحالية
            </h2>
            <p class="text-[#42493F] text-base font-tajawal font-medium">
                3 باقات نشطة
            </p>
        </div>
        <div class="flex flex-row gap-8">

            <div class="bg-white p-8 rounded-xl flex flex-col gap-6 border border-[#C1C9B94D]">
                <div class="flex flex-row gap-7 items-center justify-between">
                    <h2 class="text-[#191C18] text-2xl font-tajawal font-medium">
                        الباقات الحالية
                    </h2>
                    <img src="assets/icons/global/menu_dots.svg" alt="more" />
                </div>
                <div class="flex flex-col gap-4">
                    <div class="flex flex-row gap-10 items-center justify-between">
                        <p class="text-[#42493F] text-sm font-tajawal font-medium ">
                            عدد المكاتب
                        </p>
                        <p class="text-[#0D7F1A] text-sm font-tajawal font-bold">
                            1 مكتب رئيسي
                        </p>
                    </div>
                    <div class="flex flex-row gap-10 items-center justify-between">
                        <p class="text-[#42493F] text-sm font-tajawal font-medium">
                            عدد المستخدمين
                        </p>
                        <p class="text-[#0D7F1A] text-sm font-tajawal font-bold">
                            5 مستخدمين
                        </p>
                    </div>
                    <div class="flex flex-row gap-10 items-center justify-between">
                        <p class="text-[#42493F] text-sm font-tajawal font-medium">
                            عدد المحافظ
                        </p>
                        <p class="text-[#0D7F1A] text-sm font-tajawal font-bold">
                            20 محفظه
                        </p>
                    </div>
                    <div class="flex flex-row gap-10 items-center justify-between">
                        <p class="text-[#42493F] text-sm font-tajawal font-medium">
                            عدد الأجهزة
                        </p>
                        <p class="text-[#0D7F1A] text-sm font-tajawal font-bold">
                            7 اجهزه
                        </p>
                    </div>
                </div>
                <hr>
                <div class="flex flex-col gap-3">
                    <div class="flex flex-row gap-10 items-center justify-between px-4 py-2 bg-[#F7F9F2] rounded-lg">
                        <p class="text-[#42493F] text-xs font-tajawal font-medium">
                            شهري
                        </p>
                        <p class="text-[#196D00] text-lg font-tajawal font-medium">
                            299 ج.م
                        </p>
                    </div>
                    <div class="flex flex-row gap-10 items-center justify-between px-4 py-2 bg-[#F7F9F2] rounded-lg">
                        <p class="text-[#42493F] text-xs font-tajawal font-medium">
                            نصف سنوي
                        </p>
                        <p class="text-[#196D00] text-lg font-tajawal font-medium">
                            1,499 ج.م
                        </p>
                    </div>
                    <div class="flex flex-row gap-10 items-center justify-between px-4 py-2 bg-[#F7F9F2] rounded-lg">
                        <p class="text-[#42493F] text-xs font-tajawal font-medium">
                            سنوي
                        </p>
                        <p class="text-[#196D00] text-lg font-tajawal font-medium">
                            2,499 ج.م
                        </p>
                    </div>

                </div>
                <hr>
                <div class="flex flex-col gap-4  pl-6">
                    <div class="flex flex-row gap-10 items-center justify-between">
                        <p class="text-[#42493F] text-sm font-tajawal font-normal ">
                            عدد مرات الشراء
                        </p>
                        <p class="text-[#137FEC] text-sm font-tajawal font-bold">
                            340
                        </p>
                    </div>
                    <div class="flex flex-row gap-10 items-center justify-between">
                        <p class="text-[#42493F] text-sm font-tajawal font-normal">
                            عدد المشتركين النشطين
                        </p>
                        <p class="text-[#137FEC] text-sm font-tajawal font-bold">
                            15
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </section>
</main>
