<section class="px-6">
    <app-page-header title="قاعدة بيانات المستخدمين" [home]="home"
        [breadcrumbItems]="breadcrumbItems"></app-page-header>
</section>

<section class="p-6">
    <div>
        <h1 class="m-0 text-right text-2xl font-medium text-text-primary leading-8">
            إضافة مستخدم جديد
        </h1>
        <p class="text-text-secondary text-base font-medium">
            قم بإنشاء ملف تعريف جديد للمستخدم
        </p>
    </div>
    <!--  rounded-2xl bg-primary-op-10 cursor-pointer px-7 py-2 text-sm font-medium text-primary border border-primary transition-colors hover:bg-primary-op-30 -->
    <!-- Radio Button Selection -->
    <div class="mt-8 flex flex-row gap-7">
        <label *ngFor="let type of userTypes" [for]="'user-type-' + type.id"
            [class]="'flex items-center px-6 py-3.5 rounded-2xl border-2 transition-all duration-200 cursor-pointer text-lg ' +
                        (selectedUserType === type.id ? 'border-primary-op-30 bg-primary-op-10' : 'border-[#E2E8F0] bg-white hover:border-primary/50')">

            <!-- Radio Button -->
            <p-radioButton [inputId]="'user-type-' + type.id" name="userType" [value]="type.id"
                [(ngModel)]="selectedUserType" (ngModelChange)="onUserTypeChange()">
            </p-radioButton>

            <!-- Content -->
            <div class="flex-1 flex items-center gap-3">
                <i [class]="type.icon"
                    [class]="'text-xl ' + (selectedUserType === type.id ? 'text-text-success' : 'text-text-secondary')">
                </i>
                <div class="flex flex-col">
                    <span
                        [class]="'text-lg font-medium ' + (selectedUserType === type.id ? 'text-text-success' : 'text-text-secondary')">{{
                        type.title }}</span>
                    <!-- <span class="text-xs text-text-secondary">{{ type.description }}</span> -->
                </div>
            </div>
        </label>
    </div>

    <!-- Dynamic Content Based on Selection -->
    <div class="mt-8">
        <router-outlet></router-outlet>
    </div>
</section>
