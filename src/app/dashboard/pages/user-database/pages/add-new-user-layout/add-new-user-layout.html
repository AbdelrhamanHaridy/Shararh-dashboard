<section class="px-6">
    <app-page-header title="قاعدة بيانات المستخدمين" [home]="home"
        [breadcrumbItems]="breadcrumbItems"></app-page-header>
</section>
<section class="p-6">
    <div>
        <h1 class="m-0 text-right text-2xl font-medium text-text-primary leading-8">
            إضافة مستخدم جديد
        </h1>
        <p class="text-text-secondary text-base font-medium">
            قم بإنشاء ملف تعريف جديد للمستخدم
        </p>
    </div>
    <div class="flex flex-row gap-7 mt-8">
        <button type="button"
            class="inline-flex items-center gap-2 rounded-2xl bg-white cursor-pointer px-7 py-2 text-sm font-medium text-text-primary border border-[#E2E8F0] transition-colors ">
            <span>تاجر لأول مرة في النظام</span>
        </button>
        <button type="button"
            class="inline-flex items-center gap-2 rounded-2xl bg-primary-op-10 cursor-pointer px-7 py-2 text-sm font-medium text-primary border border-primary transition-colors hover:bg-primary-op-30">
            <span>مستخدم جديد لدى تاجر موجود</span>
        </button>
    </div>
    <div class="mt-8">
        <router-outlet></router-outlet>
    </div>
</section>
