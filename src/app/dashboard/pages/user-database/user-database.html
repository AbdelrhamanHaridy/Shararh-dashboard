<section class="px-6">
    <app-page-header title="قاعدة بيانات المستخدمين" [home]="home" [breadcrumbItems]="breadcrumbItems"
        [showActionButton]="true" actionButtonLabel="إضافة مستخدم جديد"
        (actionButtonClick)="onAddUser()"></app-page-header>
</section>
<section class="p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-2.5">
    <app-shared-kpi-card [title]="'إجمالي المستخدمين'" [number]="180" iconPath="assets/icons/cards/people.svg"
        iconBgColor="#EAD9FF" numberColor="#000" navigateLink="/user-database">
    </app-shared-kpi-card>
    <app-shared-kpi-card [title]="'مستخدمي تطبيق الادمن'" [number]="165" iconPath="assets/icons/cards/people.svg"
        iconBgColor="#D7EBFF" numberColor="#000">
    </app-shared-kpi-card>
    <app-shared-kpi-card [title]="'المستخدمون غير النشطين'" [number]="15" iconPath="assets/icons/cards/brown_bag.svg"
        iconBgColor="#FFF4D8" numberColor="#000">
    </app-shared-kpi-card>
    <app-shared-kpi-card [title]="'المستخدمين النشطين'" [number]="280" iconPath="assets/icons/cards/circle_check.svg"
        iconBgColor="#DEFFE2" numberColor="#000">
    </app-shared-kpi-card>
</section>

<!-- <app-search-filter-bar [filterTypes]="filterTypes" [(selectedType)]="selectedType">
</app-search-filter-bar> -->
<section class="p-6">
    <div class="p-6 bg-white rounded-2xl shadow-md flex flex-col gap-5 relative">
        <!-- Search Bar -->
        <div class="flex items-center gap-2 px-5 py-4 rounded-[15px] bg-[#F8FAFC] text-[#6B7280]"
            style=" height: 52px;">
            <img src="assets/icons/global/search.svg" alt="search" class="w-5 h-5" />
            <input type="text" placeholder="ابحث..."
                class="w-full bg-transparent border-none outline-none font-tajawal font-normal text-base leading-none tracking-normal text-right"
                style="color: #6B7280;" />
        </div>

        <!-- Buttons -->
        <div class="flex flex-row gap-5">
            <button type="button"
                class="inline-flex items-center gap-2 rounded-2xl bg-white cursor-pointer px-7 py-2 text-sm font-medium text-text-primary border border-[#E2E8F0] transition-colors ">
                <span>تطبيق الادمن</span>
            </button>
            <button type="button"
                class="inline-flex items-center gap-2 rounded-2xl bg-primary-op-10 cursor-pointer px-7 py-2 text-sm font-medium text-primary border border-primary transition-colors hover:bg-primary-op-30">
                <span>تطبيق الموظفين</span>
            </button>
        </div>
    </div>
</section>
<section class="p-6">
    <app-shared-table [tableData]="users" [columns]="columns" [totalRecords]="totalUsers"></app-shared-table>
</section>
