<main class="p-6 bg-amber-950 font-bold text-amber-100">
    <h1 class="text-3xl">
        Hello world!
    </h1>
    <p>subscription-management works!</p>
</main>
<form [formGroup]="userForm" (ngSubmit)="onSubmit()" class="p-6 max-w-md">
    <app-shared-text-input formControlName="fullName" label="Full Name" placeholder="Enter your full name"
        inputId="fullName" primeNgIcon="pi pi-user" [isRequired]="true"></app-shared-text-input>

    <app-shared-text-input formControlName="email" label="Email" placeholder="name@example.com" inputId="email"
        type="email" primeNgIcon="pi pi-envelope" [isRequired]="true"></app-shared-text-input>

    <app-shared-text-input formControlName="phone" label="Phone Number" placeholder="05xxxxxxxx" inputId="phone"
        primeNgIcon="pi pi-phone"></app-shared-text-input>

    <button type="submit" [disabled]="userForm.invalid"
        class="mt-6 px-4 py-2 bg-primary text-white rounded">Save</button>
</form>
