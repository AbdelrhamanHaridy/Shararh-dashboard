<section class="px-6">
    <app-page-header title="إدارة الاشتراكات" [home]="home" [breadcrumbItems]="breadcrumbItems"
        [showActionButton]="true" actionButtonLabel="تفعيل اشتراك جديد"
        (actionButtonClick)="showAddNewSubscriberDialog()"></app-page-header>
</section>
<section class="p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-2.5">
    <app-shared-kpi-card [title]="'إجمالي المتاجر المسجلة'" [number]="statistics()?.registered_stores || 0"
        iconPath="assets/icons/cards/people.svg" iconBgColor="#C3E1FF" numberColor="#137FEC"
        navigateLink="/user-database">
    </app-shared-kpi-card>
    <app-shared-kpi-card [title]="'الاشتراكات النشطة'" [number]="statistics()?.active_subscriptions || 0"
        iconPath="assets/icons/cards/people.svg" iconBgColor="#C3E1FF" numberColor="#10A922">
    </app-shared-kpi-card>
    <app-shared-kpi-card [title]="'الاشتراكات المنتهية'" [number]="statistics()?.expired_subscriptions || 0"
        iconPath="assets/icons/cards/people.svg" iconBgColor="#C3E1FF" numberColor="#D22F27">
    </app-shared-kpi-card>
    <app-shared-kpi-card [title]="'المتاجر المعلقة'" [number]="statistics()?.suspended_stores || 0"
        iconPath="assets/icons/cards/people.svg" iconBgColor="#C3E1FF" numberColor="#FF9500">
    </app-shared-kpi-card>
</section>
<section class="p-6">
    <div class="p-6 bg-white rounded-2xl shadow-md flex flex-col gap-5">
        <!-- Search Bar -->
        <div class="flex items-center gap-2 px-5 py-4 rounded-[15px] bg-[#F8FAFC] text-[#6B7280]"
            style="width: 879px; height: 52px;">
            <img src="assets/icons/global/search.svg" alt="search" class="w-5 h-5" />
            <input type="text" placeholder="ابحث..."
                class="w-full bg-transparent border-none outline-none font-tajawal font-normal text-base leading-none tracking-normal text-right"
                style="color: #6B7280;" />
        </div>

        <!-- Filter Buttons -->
        <div class="flex flex-row gap-5">
            <button type="button"
                class="inline-flex items-center gap-2 rounded-2xl bg-primary-op-10 cursor-pointer px-7 py-2 text-sm font-medium text-primary border border-primary transition-colors hover:bg-primary-op-30">
                <span>الكل</span>
            </button>
            <button type="button"
                class="inline-flex items-center gap-2 rounded-2xl bg-white cursor-pointer px-7 py-2 text-sm font-medium text-text-primary border border-[#E2E8F0] transition-colors hover:bg-primary-op-10">
                <span>مسجل</span>
            </button>
            <button type="button"
                class="inline-flex items-center gap-2 rounded-2xl bg-white cursor-pointer px-7 py-2 text-sm font-medium text-text-primary border border-[#E2E8F0] transition-colors hover:bg-primary-op-10">
                <span>مشترك</span>
            </button>
            <button type="button"
                class="inline-flex items-center gap-2 rounded-2xl bg-white cursor-pointer px-7 py-2 text-sm font-medium text-text-primary border border-[#E2E8F0] transition-colors hover:bg-primary-op-10">
                <span>مرفوض</span>
            </button>
        </div>
    </div>
</section>
<section class="p-6">
    <div class="grid grid-cols-1 md:grid-cols-2 2xl:grid-cols-3 gap-5">
        @if (subscriptions().length > 0) {
        @for (subscription of subscriptions(); track subscription.id) {
        <app-subscription-card [subscription]="subscription" (copyPhone)="copyToClipboard($event)"
            (viewDetails)="onViewDetails($event)" />
        }
        } @else {
        <p class="text-text-secondary text-center py-8">لا توجد متاجر مسجلة</p>
        }
    </div>
</section>
