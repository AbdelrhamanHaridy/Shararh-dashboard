<section class="p-6 grid grid-cols-4 gap-2.5">
    <app-shared-kpi-card [title]="'العملاء المسجلين'" [number]="120" iconPath="assets/icons/cards/people.svg"
        iconBgColor="#C3E1FF" numberColor="#137FEC" navigateLink="/subscriptions">
    </app-shared-kpi-card>
    <app-shared-kpi-card [title]="'الاشتراكات المنتهيه'" [number]="5" iconPath="assets/icons/cards/people.svg"
        iconBgColor="#C3E1FF" numberColor="#D22F27">
    </app-shared-kpi-card>
    <app-shared-kpi-card [title]="'الاشتراكات الفعًّاله'" [number]="15" iconPath="assets/icons/cards/people.svg"
        iconBgColor="#C3E1FF" numberColor="#10A922">
    </app-shared-kpi-card>
    <app-shared-kpi-card [title]="'إجمالي الاشتراكات'" [number]="20" iconPath="assets/icons/cards/people.svg"
        iconBgColor="#C3E1FF" numberColor="#000" navigateLink="/subscriptions">
    </app-shared-kpi-card>
</section>
<section class="p-6 grid grid-cols-10 gap-5">
    <div class="col-span-6">
        <app-child-table [tableData]="sessions" [columns]="sessionColumns" [title]="'متابعة أداء الموظفين'"
            [showAllButton]="true" [showAllButtonLabel]="'View all captains'">
        </app-child-table>
    </div>
    <div class="col-span-4 bg-white rounded-2xl p-5 shadow-md">
        <div class="flex flex-row gap-2">
            <img src="assets/icons/global/partition.svg" alt="Navigate">
            <h2 class="text-text-secondary text-lg font-tajawal font-bold">إحصائيات العملاء</h2>
        </div>
        <app-donut-chart [chartData]="[
                    { value: 1048, name: 'Basket ball' },
                    { value: 735, name: 'Tennis' },
                    { value: 580, name: 'Volley ball' },
                    { value: 484, name: 'Football' },
                ]" [padAngle]="0">
        </app-donut-chart>
        <app-donut-chart [chartData]="[
                    { value: 1048, name: 'Basket ball' },
                    { value: 735, name: 'Tennis' },
                    { value: 580, name: 'Volley ball' },
                    { value: 484, name: 'Football' },
                ]" [padAngle]="0">
        </app-donut-chart>
    </div>
</section>
<section class="p-6">
    <div class="pb-7">
        <div class="flex flex-row gap-2">
            <img src="assets/icons/global/notification.svg" alt="Notifications">
            <h2 class="text-text-primary text-xl font-tajawal font-medium">الاشعارات الأخيرة</h2>
        </div>
        <p></p>
    </div>
    <div class="flex flex-col gap-5">
        <app-notification message="انتهى الاشتراك الشهري لمحل الأصدقاء" messageColor="text-text-primary"
            time="منذ ساعتين">
        </app-notification>
        <app-notification message="تم تجديد اشتراك سوبر ماركت الوفاء بنجاح" messageColor="text-text-success"
            time="منذ ساعتين">
        </app-notification>
        <app-notification message="فشل في معالجة الدفع لمتجر التقنية" messageColor="text-text-primary"
            linkText="محاوله مرة اخرى" linkUrl="#" time="منذ ساعتين">
        </app-notification>
        <app-notification message="فشل في معالجة الدفع لمتجر التقنية"
            description="عميل جديد في الانتظار سجل الآن محمد احمد كعميل جديد" messageColor="text-text-primary"
            linkText="محاوله مرة اخرى" linkUrl="#" time="منذ ساعتين">
        </app-notification>
    </div>
</section>
<section class="p-6">

            <img src="assets/icons/global/chat.svg" alt="Notifications">

        </div>

    </div>
    <div class="flex flex-col gap-5">

                    <img class="w-5 h-w-5" src="assets/icons/cards/people.svg" alt="Notifications">
                </div>

                        <h2 class="text-[#2E3139] text-xl font-tajawal font-bold">صيدلية الشفاء</h2>
                        <p class="text-[12px] font-medium text-primary bg-primary-op-10 rounded-4xl px-2 py-1">تم بنجاح
                        </p>
                    </div>

                        التجديد...</p>
                </div>
            </div>
            <div
                class="flex flex-row gap-2 w-fit h-fit bg-[#E8F3FE] text-[#137FEC] rounded-2xl px-5 py-2.5 cursor-pointer">
                <p class="text-sm font-tajawal font-bold text-nowrap">اضغط للتفاصيل والرد</p>
                <img src="assets/icons/global/eye.svg" alt="Eye">
            </div>
        </div>
        <div class="p-5 bg-white rounded-2xl shadow-md flex flex-row justify-between items-end">

                    <img class="w-5 h-w-5" src="assets/icons/cards/people.svg" alt="Notifications">
                </div>
                <div class="flex flex-col gap-3.5">
                    <div class="flex flex-row gap-7">

                        <p class="text-[12px] font-medium text-primary bg-primary-op-10 rounded-4xl px-2 py-1">تم بنجاح
                        </p>
                    </div>
                    <p class="text-[#6B6B6B] text-sm font-bold">نقترح إضافة خيار الدفع عبر المحافظ الإلكترونية لتسهيل
                        التجديد...</p>
                </div>
            </div>
            <div
                class="flex flex-row gap-2 w-fit h-fit bg-[#E8F3FE] text-[#137FEC] rounded-2xl px-5 py-2.5 cursor-pointer">
                <p class="text-sm font-tajawal font-bold text-nowrap">اضغط للتفاصيل والرد</p>
                <img src="assets/icons/global/eye.svg" alt="Eye">
            </div>
        </div>
    </div>
</section>
