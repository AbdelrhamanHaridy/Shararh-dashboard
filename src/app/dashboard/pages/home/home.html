<main class="p-6 bg-amber-950 font-bold text-amber-100">
    <h1 class="text-3xl">
        Hello world!
    </h1>
    <p>home works!</p>
</main>
<section class="p-6 grid grid-cols-4 gap-2.5">
    <app-shared-kpi-card [title]="'العملاء المسجلين'" [number]="120" iconPath="assets/icons/cards/people.svg"
        iconBgColor="#C3E1FF" numberColor="#137FEC" navigateLink="/subscriptions">
    </app-shared-kpi-card>
    <app-shared-kpi-card [title]="'الاشتراكات المنتهيه'" [number]="5" iconPath="assets/icons/cards/people.svg"
        iconBgColor="#C3E1FF" numberColor="#D22F27">
    </app-shared-kpi-card>
    <app-shared-kpi-card [title]="'الاشتراكات الفعًّاله'" [number]="15" iconPath="assets/icons/cards/people.svg"
        iconBgColor="#C3E1FF" numberColor="#10A922">
    </app-shared-kpi-card>
    <app-shared-kpi-card [title]="'إجمالي الاشتراكات'" [number]="20" iconPath="assets/icons/cards/people.svg"
        iconBgColor="#C3E1FF" numberColor="#000" navigateLink="/subscriptions">
    </app-shared-kpi-card>
</section>
<section class="p-6 grid grid-cols-10 gap-2.5">
    <div class="col-span-6">
        <app-child-table [tableData]="sessions" [columns]="sessionColumns" [title]="'متابعة أداء الموظفين'"
            [showAllButton]="true" [showAllButtonLabel]="'View all captains'">
        </app-child-table>
    </div>
    <div class="col-span-4"></div>
</section>
