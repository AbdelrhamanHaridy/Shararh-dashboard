<!-- Logo -->
<div class="flex items-center justify-center gap-2">
    <img src="assets/images/logo.svg" alt="Sharara" />
</div>
<div class="flex flex-col items-center gap-3 mb-4">
    <h1 class="text-black text-[32px] font-bold">مرحبًا بعودتك — إدارة مالية أكثر تنظيمًا</h1>
    <p class="text-text-secondary text-base font-normal">لوحة تحكم متكاملة لإدارة الشحن والفواتير والتقارير المالية.</p>
</div>

<form [formGroup]="userForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-6">

    <div class="flex flex-col gap-4">
        <!-- <hr> -->
        <div class="grid grid-cols-2 gap-y-2 gap-x-12">
            <app-shared-text-input formControlName="email" label="اسم المستخدم أو البريد الإلكتروني"
                placeholder="ادخل بريدك الإلكتروني أو اسم المستخدم الخاص بك" inputId="email"
                primeNgIcon="pi pi-envelope" [isRequired]="true" class="col-span-2"></app-shared-text-input>

            <app-shared-text-input formControlName="password" label="كلمة المرور"
                placeholder="ادخل كلمة المرور الخاصه بك" inputId="password" type="password" primeNgIcon="pi pi-lock"
                [isRequired]="true" class="col-span-2"></app-shared-text-input>
        </div>
    </div>


    <p class="text-primary text-base font-medium cursor-pointer" routerLink="../forgot-password">هل نسيت كلمة المرور ؟</p>
    <button type="submit" [disabled]="userForm.invalid"
        class="w-full py-3 bg-primary hover:bg-[#16A34A] disabled:opacity-50 disabled:cursor-not-allowed text-white text-sm font-medium rounded-lg transition-colors">
        تسجيل الدخول
    </button>

    <p class="text-center text-[#64748B] text-sm">
        ليس لديك حساب ؟ <a routerLink="../register" class="text-primary font-semibold cursor-pointer">أنشئ حساب جديد</a>
    </p>
</form>
