<div class="flex flex-col gap-2 absolute top-8 left-0 w-full px-10" dir="ltr">
    <div class="flex flex-row justify-between">
        <img src="assets/icons/global/lock.svg" class="w-5" alt="Sharara" />
        <p class="text-text-secondary text-sm font-normal">خطوه 1 من 3</p>
    </div>
    <p-progressbar [value]="33" showValue="false" />
</div>
<div class="flex flex-col items-center gap-3 mb-20">
    <h1 class="text-black text-[32px] font-bold">نسيت كلمة المرور ؟</h1>
    <p class="text-text-secondary text-base font-normal">سنساعدك في إعادة ضبطه في بضع خطوات.</p>
</div>

<form [formGroup]="userForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-6">

    <div class="flex flex-col gap-4">
        <!-- <hr> -->
        <div class="grid grid-cols-2 gap-y-2 gap-x-12">
            <app-shared-text-input formControlName="email" label="رقم الموبايل أو البريد الإلكتروني"
                placeholder="ادخل بريدك الإلكتروني أو رقم موبايلك" inputId="email" primeNgIcon="pi pi-envelope"
                [isRequired]="true" class="col-span-2"></app-shared-text-input>
        </div>
    </div>


    <p class="text-primary text-base font-medium cursor-pointer" routerLink="../forgot-password">هل نسيت كلمة المرور ؟
    </p>
    <button type="button" routerLink="../otp"
        class="w-full py-3 bg-primary hover:bg-[#16A34A] disabled:opacity-50 disabled:cursor-not-allowed text-white text-sm font-medium rounded-lg transition-colors">
        أرسل كود التأكيد
    </button>

    <p class="text-center text-black text-lg font-normal cursor-pointer" routerLink="../login">
        لدي حساب بالفعل
    </p>
</form>
