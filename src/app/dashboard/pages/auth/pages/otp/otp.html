<div class="flex flex-col gap-2 absolute top-8 left-0 w-full px-10" dir="ltr">
    <div class="flex flex-row justify-between">
        <img src="assets/icons/global/lock.svg" class="w-5" alt="Sharara" />
        <p class="text-text-secondary text-sm font-normal">خطوه 2 من 3</p>
    </div>
    <p-progressbar [value]="75" showValue="false" />
</div>
<div class="flex flex-col items-center gap-3 mb-20">
    <h1 class="text-black text-[32px] font-bold">أدخل كود OTP</h1>
    <p class="text-text-secondary text-base font-normal">أرسلنا رمزاً الى ah************@gmail.com</p>
</div>

<form [formGroup]="userForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-6">

    <div class="flex flex-col gap-4">
        <!-- <hr> -->
        <div class="grid grid-cols-2 gap-y-4 gap-x-12">
            <label for="" class="text-base font-normal text-black">ادخل كود مكون من 6 أرقام </label>
            <p-inputotp class="col-span-2 mx-auto" size="large" [length]="6" />

        </div>
    </div>


    <button type="button" routerLink="../reset-password"
        class="w-full py-3 bg-primary hover:bg-[#16A34A] disabled:opacity-50 disabled:cursor-not-allowed text-white text-sm font-medium rounded-lg transition-colors">
        أرسل كود التأكيد
    </button>

    <p class="text-center text-black text-lg font-normal cursor-pointer" routerLink="../login">
        لدي حساب بالفعل
    </p>
</form>
