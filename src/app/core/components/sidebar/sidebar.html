<aside class="flex h-screen w-71.75 flex-col border-l border-gray-100 bg-white py-6 overflow-auto">
    <!-- Logo -->
    <div class="mb-8 flex items-center justify-center gap-2 px-6">
        <svg width="34" height="34" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M17 1L30 8.5V25.5L17 33L4 25.5V8.5L17 1Z" fill="#111827" />
            <path d="M17 1L30 8.5L17 16L4 8.5L17 1Z" fill="#10B981" />
            <path d="M17 16L30 8.5V25.5L17 33V16Z" fill="#059669" />
        </svg>
        <div class="text-right leading-tight">
            <p class="text-lg font-bold text-gray-900">Sharara</p>
            <p class="text-[9px] font-semibold tracking-wide text-gray-400">
                FINANCIAL TRANSFERS<br />MANAGEMENT
            </p>
        </div>
    </div>

    <!-- Nav -->
    <nav class="flex flex-1 flex-col gap-5 px-4">
        <ng-container *ngFor="let item of navItems">

            <!-- Leaf item (unchanged, exact same style as before) -->
            <a *ngIf="!item.children" [routerLink]="item.route" routerLinkActive="is-active" #rla="routerLinkActive"
                [routerLinkActiveOptions]="{ exact: false }" class="relative flex items-center gap-3 rounded-[10px] bg-transparent p-3.75
                        border-r-3 border-transparent
                        transition-all duration-1000" [class.border-primary]="rla.isActive"
                [class.bg-primary-op-8]="rla.isActive">

                <span class="flex h-6 w-6 shrink-0 items-center justify-center">
                    <img [class.active-svg]="rla.isActive" [src]="'assets/icons/sidebar/' + item.icon"
                        [alt]="item.label" class="h-6 w-6 object-contain" />
                </span>
                <span class="text-[15px] font-medium text-text-secondary" [class.text-text-success]="rla.isActive">
                    {{ item.label }}
                </span>
            </a>

            <!-- Group item -->
            <div *ngIf="item.children">
                <button type="button" (click)="toggle(item)"
                    class="flex w-full items-center gap-3 rounded-[10px] p-3.75 transition-colors duration-300">


                    <span class="flex h-6 w-6 shrink-0 items-center justify-center">
                        <img [src]="'assets/icons/sidebar/' + item.icon" [alt]="item.label"
                            class="h-6 w-6 object-contain" />
                    </span>
                    <span class="flex-1 text-right text-[15px] font-medium text-text-secondary"
                        [class.font-semibold]="isOpen(item)" [class.text-gray-900]="isOpen(item)">
                        {{ item.label }}
                    </span>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        class="h-4 w-4 shrink-0 text-gray-400 transition-transform duration-300"
                        [class.rotate-180]="!isOpen(item)">
                        <path d="M6 9l6 6 6-6" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>

                </button>

                <!-- Sub items -->
                <div class="overflow-hidden transition-all duration-300" [class.max-h-0]="!isOpen(item)"
                    [class.max-h-96]="isOpen(item)">
                    <ul class="mt-1 flex flex-col">
                        <li *ngFor="let child of item.children">
                            <a [routerLink]="child.route" routerLinkActive="is-active" #crla="routerLinkActive"
                                [routerLinkActiveOptions]="{ exact: false }"
                                class="relative flex items-center py-2.5 pr-11 pl-3.75 text-[14px] font-medium text-text-secondary transition-colors duration-300"
                                [class.text-text-success]="crla.isActive">

                                <span *ngIf="crla.isActive"
                                    class="absolute right-9 top-1/2 h-3.5 w-0.5 -translate-y-1/2 rounded-full bg-primary">
                                </span>

                                {{ child.label }}
                            </a>
                        </li>
                    </ul>
                </div>
            </div>

        </ng-container>
    </nav>
</aside>
